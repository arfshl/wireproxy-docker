name: Build armv5

on:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches: [ main ]
    paths: [ 'Dockerfile.debian.armv5', '.github/workflows/build-armv5.yml' ]
  workflow_dispatch:

permissions:
   contents: read
   packages: write

jobs:
    
    build-debian:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
    
          - name: Set up QEMU
            uses: docker/setup-qemu-action@v2
    
          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v2
    
          - name: Log in to GHCR
            uses: docker/login-action@v4
            with:
             registry: ghcr.io
             username: ${{ github.repository_owner }}
             password: ${{ secrets.GITHUB_TOKEN }}
      
          - name: Log in to Docker Hub
            uses: docker/login-action@v4
            with:
               username: arfshl
               password: ${{ secrets.DOCKERPASS }}

          - name: Downcase Repo Name
            run: echo "REPONAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
    
          - name: Build and push Docker images
            uses: docker/build-push-action@v3
            with:
              context: .
              push: true
              file: Dockerfile.debian.armv5
              platforms: linux/arm/v5
              tags: |
                ghcr.io/${{ env.REPONAME }}:debian-armv5
                arfshl/wireproxy:debian-armv5