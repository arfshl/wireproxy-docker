name: Build

on:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches: [ main ]
    paths: [ 'Dockerfile*', '.github/workflows/build.yml' ]
  workflow_dispatch:

permissions:
   contents: read
   packages: write

jobs:
    
    build-debian:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v7
    
          - name: Set up QEMU
            uses: docker/setup-qemu-action@v4
    
          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v4
    
          - name: Log in to GHCR
            uses: docker/login-action@v4
            with:
             registry: ghcr.io
             username: ${{ github.repository_owner }}
             password: ${{ secrets.GITHUB_TOKEN }}
      
          - name: Log in to Docker Hub
            uses: docker/login-action@v4
            with:
               username: arfshl
               password: ${{ secrets.DOCKERPASS }}

          - name: Downcase Repo Name
            run: echo "REPONAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
    
          - name: Build and push Docker images
            uses: docker/build-push-action@v7
            with:
              context: .
              push: true
              file: Dockerfile.debian
              platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/ppc64le,linux/s390x,linux/riscv64
              tags: |
                ghcr.io/arfshl/wireproxy:debian
                ghcr.io/arfshl/wireproxy:latest
                arfshl/wireproxy:latest
                arfshl/wireproxy:debian
    

    build-alpine:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v7
    
          - name: Set up QEMU
            uses: docker/setup-qemu-action@v4
    
          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v4
    
          - name: Log in to GHCR
            uses: docker/login-action@v4
            with:
             registry: ghcr.io
             username: ${{ github.repository_owner }}
             password: ${{ secrets.GITHUB_TOKEN }}
      
          - name: Log in to Docker Hub
            uses: docker/login-action@v4
            with:
               username: arfshl
               password: ${{ secrets.DOCKERPASS }}

          - name: Downcase Repo Name
            run: echo "REPONAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
    
          - name: Build and push Docker images
            uses: docker/build-push-action@v7
            with:
              context: .
              push: true
              file: Dockerfile.alpine
              platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/ppc64le,linux/s390x,linux/riscv64
              tags: |
                ghcr.io/arfshl/wireproxy:alpine
                arfshl/wireproxy:alpine